<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STC | Ingeniería de Sistemas & Resiliencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --stc-blue: #0047AB; /* Azul Rey / Cobalto del logo */
            --stc-gray: #475569; /* Gris Industrial */
            --stc-light-bg: #FDFDFD;
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--stc-light-bg); color: #0f172a; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bg-stc-blue { background-color: var(--stc-blue); }
        .text-stc-blue { color: var(--stc-blue); }
        .border-stc-blue { border-color: var(--stc-blue); }
        
        /* Efecto de Botón Profesional */
        .btn-eng {
            border: 2px solid var(--stc-blue);
            color: var(--stc-blue);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .btn-eng:hover {
            background-color: var(--stc-blue);
            color: white;
            box-shadow: 0 10px 20px -10px var(--stc-blue);
        }
        
        /* Línea de acento técnica */
        .tech-line {
            height: 3px;
            width: 60px;
            background: linear-gradient(90deg, var(--stc-blue), #60a5fa);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="py-10 px-6 md:px-12 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-6">
            <img src="logo.png" alt="STC" class="h-14 w-auto object-contain">
            <div class="hidden sm:block h-10 w-[1px] bg-slate-200"></div>
            <div class="hidden sm:block">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Ingeniería Senior</p>
